name: warket

options:
  bundleIdPrefix: com.blhdes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: en

# Supabase URL + anon key live here (gitignored). See Secrets.xcconfig.example.
configFiles:
  Debug: warket/Config/Secrets.xcconfig
  Release: warket/Config/Secrets.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  warket:
    type: application
    platform: iOS
    sources:
      - path: warket
        excludes:
          - "Config/Secrets.xcconfig"
          - "Config/Secrets.xcconfig.example"
    settings:
      base:
        INFOPLIST_FILE: warket/Config/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blhdes.warket
        PRODUCT_NAME: warket
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: "YES"
    dependencies:
      - package: Supabase
        product: Supabase

  warketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - warketTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blhdes.warketTests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: warket
